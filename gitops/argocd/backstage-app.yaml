apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backstage
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/roilagziel12345/DEVOPS-BACKSTAGE.git
    targetRevision: main
    path: gitops/backstage
    helm:
      releaseName: backstage
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: backstage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
